name: Python Greetings Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  install-pip-deps:
    runs-on: self-hosted
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Installing dependencies info
        run: echo "Installing all required dependencies..."

      - name: Install Python dependencies
        uses: ./.github/actions/install-python-deps

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Deploy dev info
        run: echo "Deploying application to dev..."

      - name: Deploy to dev
        uses: ./.github/actions/deploy-python-app
        with:
          environment: dev
          port: "7001"

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Test dev info
        run: echo "Running tests on dev..."

      - name: Run dev tests
        uses: ./.github/actions/run-api-tests
        with:
          environment: dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Deploy stg info
        run: echo "Deploying application to stg..."

      - name: Deploy to stg
        uses: ./.github/actions/deploy-python-app
        with:
          environment: stg
          port: "7002"

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Test stg info
        run: echo "Running tests on stg..."

      - name: Run stg tests
        uses: ./.github/actions/run-api-tests
        with:
          environment: stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Deploy preprod info
        run: echo "Deploying application to preprod..."

      - name: Deploy to preprod
        uses: ./.github/actions/deploy-python-app
        with:
          environment: preprod
          port: "7003"

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Test preprod info
        run: echo "Running tests on preprod..."

      - name: Run preprod tests
        uses: ./.github/actions/run-api-tests
        with:
          environment: preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Deploy prod info
        run: echo "Deploying application to prod..."

      - name: Deploy to prod
        uses: ./.github/actions/deploy-python-app
        with:
          environment: prod
          port: "7004"

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Test prod info
        run: echo "Running tests on prod..."

      - name: Run prod tests
        uses: ./.github/actions/run-api-tests
        with:
          environment: prod