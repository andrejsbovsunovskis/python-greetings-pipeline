name: Python Greetings Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  install-pip-deps:
    runs-on: self-hosted
    steps:
      - name: Installing dependencies info
        run: echo "Installing all required dependencies..."

      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Checkout python-greetings repository
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Create virtual environment
        working-directory: python-greetings
        run: python3 -m venv venv

      - name: Install pip dependencies
        working-directory: python-greetings
        run: ./venv/bin/python -m pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - name: Deploy dev info
        run: echo "Deploying application to dev..."

      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Checkout python-greetings repository
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Stop existing dev app if running
        working-directory: python-greetings
        run: pm2 delete greetings-app-dev || true

      - name: Create virtual environment
        working-directory: python-greetings
        run: python3 -m venv venv

      - name: Install pip dependencies
        working-directory: python-greetings
        run: ./venv/bin/python -m pip install -r requirements.txt

      - name: Start dev app
        working-directory: python-greetings
        run: pm2 start app.py --interpreter ./venv/bin/python --name greetings-app-dev -- --port 7001

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - name: Test dev info
        run: echo "Running tests on dev..."

      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Checkout course-js-api-framework repository
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install npm dependencies
        working-directory: course-js-api-framework
        run: npm install

      - name: Run tests on dev
        working-directory: course-js-api-framework
        run: npm run greetings greetings_dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - name: Deploy stg info
        run: echo "Deploying application to stg..."

      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Checkout python-greetings repository
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Stop existing stg app if running
        working-directory: python-greetings
        run: pm2 delete greetings-app-stg || true

      - name: Create virtual environment
        working-directory: python-greetings
        run: python3 -m venv venv

      - name: Install pip dependencies
        working-directory: python-greetings
        run: ./venv/bin/python -m pip install -r requirements.txt

      - name: Start stg app
        working-directory: python-greetings
        run: pm2 start app.py --interpreter ./venv/bin/python --name greetings-app-stg -- --port 7002

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps:
      - name: Test stg info
        run: echo "Running tests on stg..."

      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Checkout course-js-api-framework repository
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install npm dependencies
        working-directory: course-js-api-framework
        run: npm install

      - name: Run tests on stg
        working-directory: course-js-api-framework
        run: npm run greetings greetings_stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - name: Deploy preprod info
        run: echo "Deploying application to preprod..."

      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Checkout python-greetings repository
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Stop existing preprod app if running
        working-directory: python-greetings
        run: pm2 delete greetings-app-preprod || true

      - name: Create virtual environment
        working-directory: python-greetings
        run: python3 -m venv venv

      - name: Install pip dependencies
        working-directory: python-greetings
        run: ./venv/bin/python -m pip install -r requirements.txt

      - name: Start preprod app
        working-directory: python-greetings
        run: pm2 start app.py --interpreter ./venv/bin/python --name greetings-app-preprod -- --port 7003

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps:
      - name: Test preprod info
        run: echo "Running tests on preprod..."

      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Checkout course-js-api-framework repository
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install npm dependencies
        working-directory: course-js-api-framework
        run: npm install

      - name: Run tests on preprod
        working-directory: course-js-api-framework
        run: npm run greetings greetings_preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod
    steps:
      - name: Deploy prod info
        run: echo "Deploying application to prod..."

      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Checkout python-greetings repository
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Stop existing prod app if running
        working-directory: python-greetings
        run: pm2 delete greetings-app-prod || true

      - name: Create virtual environment
        working-directory: python-greetings
        run: python3 -m venv venv

      - name: Install pip dependencies
        working-directory: python-greetings
        run: ./venv/bin/python -m pip install -r requirements.txt

      - name: Start prod app
        working-directory: python-greetings
        run: pm2 start app.py --interpreter ./venv/bin/python --name greetings-app-prod -- --port 7004

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod
    steps:
      - name: Test prod info
        run: echo "Running tests on prod..."

      - name: Checkout pipeline repository
        uses: actions/checkout@v6

      - name: Checkout course-js-api-framework repository
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install npm dependencies
        working-directory: course-js-api-framework
        run: npm install

      - name: Run tests on prod
        working-directory: course-js-api-framework
        run: npm run greetings greetings_prod